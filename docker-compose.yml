# --- 공통 설정 ---
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# --- Networks ---
networks:
  aaa-network:
    driver: bridge
    ipam:
      config:
        # 서브넷 고정: Docker 기본 할당(172.17~19.x.x) 충돌 방지, NAS 멀티 스택 라우팅 안정성, iptables 규칙 불변
        # /24: ~6 컨테이너 대비 충분. 향후 스택은 172.21.0.0/24 이후 사용
        - subnet: 172.20.0.0/24

services:

  # --- MySQL ---
  mysql:
    image: mysql:8.4
    container_name: aaa-mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    env_file:
      - ${AAA_SSD_BASE}/secrets/.env.mysql
    expose:
      - "3306"
    volumes:
      - ${AAA_SSD_BASE}/data/mysql:/var/lib/mysql
      - ${AAA_SSD_BASE}/config/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ${AAA_SSD_BASE}/config/mysql/initdb.d:/docker-entrypoint-initdb.d:ro
      - ${AAA_HDD_BASE}/logs/mysql:/var/log/mysql
    logging: *default-logging
    networks:
      - aaa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- Redis ---
  redis:
    image: redis:8.6
    container_name: aaa-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    env_file:
      - ${AAA_SSD_BASE}/secrets/.env.redis
    expose:
      - "6379"
    volumes:
      - ${AAA_SSD_BASE}/data/redis:/data
      - ${AAA_SSD_BASE}/config/redis/redis.conf:/etc/redis/redis.conf:ro
      - ${AAA_SSD_BASE}/config/redis/users.acl:/etc/redis/users.acl:ro
      - ${AAA_HDD_BASE}/logs/redis:/var/log/redis
    logging: *default-logging
    command: redis-server /etc/redis/redis.conf
    networks:
      - aaa-network
    healthcheck:
      # CMD-SHELL: redis-cli는 NOAUTH/LOADING에도 exit 0을 반환하므로 PONG 문자열 검증 필수 (docker-library/healthcheck 공식 패턴)
      # CMD-SHELL 보안 참고: 명령이 docker-compose.yml에 하드코딩되어 사용자 입력이 아니므로 Shell Injection 위험 없음.
      #   REDISCLI_AUTH 환경변수로 인증하므로 -a 플래그 미사용 → ps/프로세스 리스트에 비밀번호 비노출
      #   --user admin: redis-cli는 REDISCLI_AUTH_USER를 미지원하므로 --user 플래그로 명시
      test: ["CMD-SHELL", "[ \"$$(redis-cli -h 127.0.0.1 --user admin ping)\" = 'PONG' ]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Collector: 주식 시장 데이터 수집 ---
  collector:
    image: ${COLLECTOR_IMAGE:-ghcr.io/jongtix/aaa-collector:latest}
    container_name: aaa-collector
    restart: unless-stopped
    stop_grace_period: 40s
    # N100 4코어 기준 초기값, 실측 후 조정
    deploy:
      resources:
        limits:
          memory: 800M
          cpus: "1.5"
    env_file:
      - ${AAA_SSD_BASE}/secrets/.env.common
      - ${AAA_SSD_BASE}/secrets/.env.collector
    expose:
      - "8080"
    volumes:
      - ${AAA_HDD_BASE}/logs/aaa-collector:/var/log/aaa-collector
    logging: *default-logging
    networks:
      - aaa-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
